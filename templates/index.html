<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Deep Space Object Classifier</title>

<style>

body{

    font-family: Arial;

    color: white;

    text-align: center;

    margin-top: 50px;

    background-image: url("{{ url_for('static', filename='background.png') }}");

    background-size: cover;

    background-position: center;

    background-repeat: no-repeat;

    background-attachment: fixed;

}

button{

    padding:10px 20px;

    margin-top:20px;

    font-size:18px;

}

</style>

</head>

<body>

<h1>🌌 Deep Space Object Classifier V1.1</h1>
<h2>Upload an image of a deep space object to classify it.</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">

Predict

</button>

</form>

{% if prediction %}

<h2>

Prediction:

{{ prediction }}

</h2>

<h3>

Confidence:

{{ confidence }}%

</h3>

<h5>New release coming soon:<br>
    -More classes<br>
    -Better accuracy<br>
    -Faster predictions<br>

{% endif %}

</body>

</html>
